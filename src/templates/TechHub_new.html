<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="theme-color" content="#050505">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preload" as="image" href="images/TechHub_logo.png">
  <title>Techhub news</title>
  <link rel="icon" type="image/png" href="images/favicon/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon/favicon-16x16.png">
  <link rel="manifest" href="images/favicon/site.webmanifest">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      background-color: #050505;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
      padding: 20px;
    }

    a {
      text-decoration: none;
    }

    a:hover {
      color: #FFFFFF !important;
    }

    .navbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 50px;
    }

    .home-btn {
      background-color: #2b2d31;
      color: #FF7B00;
      border: 2px solid #FF7B00;
      padding: 10px;
      font-size: 20px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 45px;
      height: 45px;
    }

    .auth-buttons {
      display: flex;
      gap: 10px;
    }

    .auth-link {
      flex: 1;
    }

    .auth-btn {
      background-color: #2b2d31;
      color: #f8f9fa;
      border: 2px solid #FF7B00;
      padding: 8px 20px;
      font-size: 14px;
      border-radius: 24px;
      cursor: pointer;
    }

    .auth-btn.user {
      border-radius: 50px;
    }

    .user-icon {
      color: #FF7B00;
    }

    button:hover {
      transform: scale(1.05);
      transition: 0.3s ease;
      filter: brightness(1.2);
    }

    .logo-container {
      font-size: 90px;
      font-weight: bold;
      letter-spacing: -5px;
      margin-bottom: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .logo-tech {
      color: #FFFFFF;
    }

    .logo-hub {
      background-color: #FF7B00;
      color: #050505;
      margin-left: 5px;
      padding: 2px 15px;
      border-radius: 36px;
    }

    .search-section {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .search-bar-container {
      display: flex;
      width: 100%;
      gap: 10px;
    }

    .search-input {
      flex: 1;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 24px;
      border: 2px solid #FF7B00;
      background-color: #2b2d31;
      color: white;
      outline: none;
    }

    .search-btn {
      background-color: #FF7B00;
      color: #000000;
      border: none;
      padding: 0 25px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 24px;
      cursor: pointer;
    }

    .tag-buttons-container {
      margin-top: 25px;
      display: flex;
      gap: 12px;
    }

    .tag-btn {
      background-color: #2b2d31;
      color: #f8f9fa;
      border: 2px solid #FF7B00;
      padding: 10px 20px;
      font-size: 14px;
      border-radius: 24px;
      cursor: pointer;
    }

    .section-title {
      font-size: 24px;
      text-align: center;
      padding: 7.5px;
      display: flex;
      justify-content: center;
      border-left: 3px solid #FF7B00;
      border-bottom: 3px solid #FF7B00;
      margin-top: 30px;
      border-radius: 24px;
    }

    .section-title strong {
      color: #FFFFFF;
    }

    #noResults {
      display: none;
      color: #aaa;
      margin-top: 50px;
      font-size: 18px;
      font-style: italic;
    }

    .content-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 1750px;
      margin-top: 50px;
    }

    .content-card {
      border-radius: 12px;
      overflow: hidden;
      background-color: #1a1a1a;
      border: 1px solid #333;
    }

    .content-card:hover {
      transform: scale(1.05);
      transition: 0.3s ease;
      filter: brightness(1.2);
    }

    .content-media {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    .card-body {
      padding: 15px;
      color: white;
    }

    h3 {
      margin: 0;
      font-size: 16px;
      color: #FF7B00;
    }

    .card-desc {
      margin: 5px 0 0;
      font-size: 13px;
      color: #aaa;
    }

    .card-link {
      color: #FF7B00;
      text-decoration: underline;
    }

    .footer-container {
      margin-top: 50px;
      text-align: center;
      width: 100%;
    }

    .social-icons {
      display: flex;
      gap: 20px;
      font-size: 24px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .icon {
      font-size: 30px;
      color: white;
      cursor: pointer;
      transition: 0.25s;
      display: flex;
      width: auto;
      height: auto;
      justify-content: center;
      align-items: center;
    }

    .icon:hover {
      color: #FF7B00;
      transform: translateY(-15px) scale(1.7);
    }

    .social-link {
      color: #FF7B00;
    }

    .footer-quote {
      border-bottom: 3px solid #FF7B00;
      border-radius: 24px;
      padding: 15px;
      color: #ffffff;
      max-width: 400px;
      margin: 0 auto 40px;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000b3;
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #2b2d31;
      border: 1px solid #FF7B00;
      padding: 20px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px #00000080;
      color: white;
    }

    .modal-header {
      text-align: left;
      margin-bottom: 15px;
    }

    .dot {
      height: 8px;
      width: 8px;
      background: #707070;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    .modal-btn {
      margin-top: 20px;
      border: 2px solid #ff7B00;
      background: #2b2d31;
      padding: 8px 30px;
      border-radius: 24px;
      color: #f8f9fa;
      cursor: pointer;
      transition: 0.3s;
    }

    .modal-btn:hover {
      transform: scale(1.05);
      transition: 0.3s ease;
      filter: brightness(1.2);
    }
  </style>
</head>

<body>

  <div class="navbar">
    <a href="harvic819063.github.io">
      <button class="home-btn">
        <i class="fa-solid fa-house"></i>
      </button>
    </a>
    <div class="auth-buttons">
      <a href="About Me.html" target="_blank" class="auth-link">
        <button class="auth-btn user">
          <i class="fa-solid fa-user user-icon"></i>
        </button>
      </a>
      <button class="auth-btn" onclick="showAlert()">Login</button>
      <button class="auth-btn" onclick="showAlert()">Signup</button>
    </div>
  </div>

  <div class="logo-container">
    <span class="logo-tech">Tech</span>
    <span class="logo-hub">Hub</span>
  </div>

  <div class="section-title">
    <strong>Techhub news.</strong>
  </div>

  <div id="noResults">No tech matches found. Try searching for "Game" or "Hardware"!</div>

  <article>
    
  </article>

  <div class="footer-container">
    <div class="social-icons">
      <div class="icon"><a href="https://www.instagram.com/_j.a.r.v.y_/" target="_blank" class="social-link"><i class='fab fa-instagram'></i></a></div>
      <div class="icon"><a href="https://www.threads.net/@_j.a.r.v.y_" target="_blank" class="social-link"><i class='fab fa-threads'></i></a></div>
      <div class="icon"><a href="https://www.facebook.com/harvic.john/" target="_blank" class="social-link"><i class='fab fa-facebook'></i></a></div>
      <div class="icon"><a href="https://www.youtube.com/@harvicjohn" target="_blank" class="social-link"><i class='fab fa-youtube'></i></a></div>
    </div>
    <div class="footer-quote">
      Remember! Coding is poetry written in pure logic.
    </div>
  </div>

  <div id="customAlert" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <p id="modalMessage">Service not available at the moment.</p>
      <button onclick="closeModal()" class="modal-btn">OK</button>
    </div>
  </div>

  <script>
    function showAlert() {
      document.getElementById('customAlert').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('customAlert').style.display = 'none';
    }

    function filterContent() {
      const input = document.getElementById('searchInput');
      const filter = input.value.toLowerCase();
      const cards = document.getElementsByClassName('content-card');
      const noResults = document.getElementById('noResults');
      let visibleCount = 0;

      for (let i = 0; i < cards.length; i++) {
        const title = cards[i].getElementsByTagName("h3")[0];
        const description = cards[i].getElementsByTagName("p")[0];
        const textValue = (title ? title.textContent : "") + " " + (description ? description.textContent : "");

        if (textValue.toLowerCase().indexOf(filter) > -1) {
          cards[i].style.display = "";
          visibleCount++;
        } else {
          cards[i].style.display = "none";
        }
      }

      // Show "No Results" message if everything is hidden
      noResults.style.display = (visibleCount === 0) ? "block" : "none";
    }
  </script>

</body>

</html>
